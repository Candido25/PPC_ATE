<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Online | PPC Ate</title>
  <link rel="icon" href="assets/favicon-ppc.png">
  <script src="config.js"></script>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f6f8f6;color:#1f2b22}
    .container{max-width:1180px;margin:auto;padding:24px 20px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:14px}.brand img{width:58px;height:58px;object-fit:contain;background:#fff;border-radius:999px;padding:5px;border:1px solid #dce7df}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:20px 0}
    .card{background:#fff;border:1px solid #dce7df;border-radius:16px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.06)}
    .card b{font-size:30px;color:#117a3b}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #dce7df;border-radius:16px;overflow:hidden}
    th,td{padding:12px;border-bottom:1px solid #edf2ee;text-align:left;font-size:14px}
    th{background:#f6faf7}
    .muted{color:#6b756e}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .btn{display:inline-block;padding:12px 16px;border-radius:10px;font-weight:700;background:#117a3b;color:#fff;text-decoration:none;border:none;cursor:pointer}
    .btn.alt{background:#e8efe9;color:#17351f}
    @media (max-width:980px){.cards{grid-template-columns:1fr 1fr}}
    @media (max-width:680px){.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <div class="head">
      <div class="brand">
        <img src="assets/logo-ppc.png" alt="Logo PPC">
        <div>
          <h1 style="margin:0;font-size:28px">Panel Online · PPC Ate</h1>
          <div class="muted">Voluntarios y fiscalización ciudadana</div>
        </div>
      </div>
      <div>
        <a class="btn alt" href="index.html">Volver a la web</a>
      </div>
    </div>

    <div class="cards">
      <div class="card"><div>Total reportes</div><b id="cReportes">0</b></div>
      <div class="card"><div>Voluntarios</div><b id="cVoluntarios">0</b></div>
      <div class="card"><div>Delincuencia</div><b id="cDelincuencia">0</b></div>
      <div class="card"><div>Basura</div><b id="cBasura">0</b></div>
    </div>

    <div class="toolbar">
      <h2 style="margin:0">Últimos reportes</h2>
      <button class="btn" onclick="loadData()">Actualizar</button>
    </div>

    <div style="overflow:auto">
      <table>
        <thead>
          <tr><th>Fecha</th><th>Nombre</th><th>Categoría</th><th>Zona</th><th>Detalle</th></tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5">Cargando datos...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const APP = window.APP_CONFIG || {};
    const API_URL = APP.apiUrl || "";

    async function loadData(){
      const body = document.getElementById("tbody");
      if(!API_URL){
        body.innerHTML = `<tr><td colspan="5">Falta configurar API_URL en config.js</td></tr>`;
        return;
      }
      body.innerHTML = `<tr><td colspan="5">Cargando...</td></tr>`;
      try{
        const res = await fetch(API_URL);
        const data = await res.json();
        const reportes = data.reportes || [];
        const voluntarios = data.voluntarios || [];
        document.getElementById("cReportes").textContent = reportes.length;
        document.getElementById("cVoluntarios").textContent = voluntarios.length;
        document.getElementById("cDelincuencia").textContent = reportes.filter(r => r.categoria === "Delincuencia").length;
        document.getElementById("cBasura").textContent = reportes.filter(r => r.categoria === "Basura").length;
        body.innerHTML = "";
        if(!reportes.length){
          body.innerHTML = `<tr><td colspan="5">Aún no hay reportes registrados.</td></tr>`;
          return;
        }
        reportes.slice(0,50).forEach(r=>{
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${r.fecha || ""}</td><td>${r.nombre || ""}</td><td>${r.categoria || ""}</td><td>${r.zona || ""}</td><td>${r.detalle || ""}</td>`;
          body.appendChild(tr);
        });
      }catch(err){
        body.innerHTML = `<tr><td colspan="5">No se pudo cargar el panel: ${err.message}</td></tr>`;
      }
    }
    loadData();
  </script>
</body>
</html>
